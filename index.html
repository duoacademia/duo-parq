<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>PAR-Q | DUO Academia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar" aria-label="Cabeçalho">
      <div class="brand">
        <div class="document-mark" aria-hidden="true"><span></span></div>
        <img class="logo-mark" src="logo.png" alt="DUO Academia">
      </div>
      <div class="secure-chip">
        <span class="secure-dot"></span>
        PAR-Q
      </div>
    </header>

    <section class="intro" aria-labelledby="page-title">
      <p class="eyebrow">Questionário obrigatório</p>
      <h1 id="page-title">PAR-Q DUO Academia</h1>
      <p class="subtitle">
        Responda às perguntas de prontidão para atividade física e registre sua confirmação antes de iniciar as atividades.
      </p>
    </section>

    <section class="progress-area" aria-label="Progresso">
      <div class="progress-copy">
        <span id="progressLabel">Etapa 1 de 10</span>
        <strong id="progressPercent">10%</strong>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="stage-shell" aria-live="polite">
      <article id="stepCard" class="step-card"></article>
    </section>
  </main>

  <template id="identityTemplate">
    <div class="step-content">
      <div class="step-number"></div>
      <h2></h2>
      <div class="field-grid"></div>
    </div>
    <div class="actions">
      <button class="button secondary" id="prevButton" type="button">Voltar</button>
      <button class="button primary" id="nextButton" type="button" disabled>Próximo</button>
    </div>
  </template>

  <template id="questionTemplate">
    <div class="step-content">
      <div class="step-number"></div>
      <h2></h2>
      <div class="statement"></div>
      <div class="choice-grid">
        <button class="choice-button yes" type="button" data-answer="S">Sim</button>
        <button class="choice-button no" type="button" data-answer="N">Não</button>
      </div>
    </div>
    <div class="actions">
      <button class="button secondary" id="prevButton" type="button">Voltar</button>
    </div>
  </template>

  <template id="termTemplate">
    <div class="step-content">
      <div class="step-number"></div>
      <h2>Termo de Responsabilidade</h2>
      <div class="statement">
        <p>Declaro estar ciente de que, caso alguma resposta tenha sido "sim", é recomendável a consulta médica antes de aumentar meu nível de atividade física.</p>
        <p>Assumo plena responsabilidade por minha prática de atividade física e confirmo que respondi às perguntas acima de forma verdadeira.</p>
      </div>
    </div>

    <label class="confirm-box final-confirm">
      <input type="checkbox" id="termConfirm">
      <span class="check-visual" aria-hidden="true"></span>
      <span>Li e concordo com o termo acima.</span>
    </label>

    <section class="signature-block">
      <div class="signature-header">
        <h3>Rúbrica ou assinatura</h3>
        <button class="button ghost" id="clearSignature" type="button">Limpar</button>
      </div>
      <canvas id="signatureCanvas" class="signature-canvas" aria-label="Campo para rúbrica ou assinatura"></canvas>
    </section>

    <p id="formMessage" class="form-message" role="alert"></p>

    <div class="actions final-actions">
      <button class="button secondary" id="prevButton" type="button">Voltar</button>
      <button class="button primary finish" id="finishButton" type="button" disabled>FINALIZAR</button>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
